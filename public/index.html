<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bikeler Adda - FIFA WC 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0A0E1A;
            color: #fff;
        }
        
        .container { max-width: 600px; margin: 0 auto; }
        
        .tab-bar {
            display: flex;
            background: #0D1525;
            border-bottom: 1px solid #1F2D42;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .tab-btn {
            flex: 1;
            padding: 13px 4px;
            border: none;
            background: transparent;
            color: #4A5568;
            font-weight: 400;
            font-size: 13px;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .tab-btn.active {
            color: #fff;
            font-weight: 700;
            border-bottom-color: #00D563;
        }
        
        .tab-content { display: none; padding: 16px; }
        .tab-content.active { display: block; }
        
        .header {
            text-align: center;
            padding: 16px 0 12px;
        }
        
        .header h1 {
            font-size: 21px;
            font-weight: 800;
            margin: 0;
        }
        
        .header p {
            color: #6B7A99;
            font-size: 12px;
            margin: 3px 0 0;
        }
        
        .date-strip {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            margin-bottom: 14px;
            padding-bottom: 4px;
        }
        
        .date-btn {
            flex-shrink: 0;
            padding: 6px 10px;
            border-radius: 8px;
            min-width: 44px;
            text-align: center;
            border: 1.5px solid #1F2D42;
            background: transparent;
            cursor: pointer;
            color: #8A9BBB;
        }
        
        .date-btn.active {
            border-color: #00D563;
            background: #0D2E1E;
        }
        
        .date-btn-day { color: #8A9BBB; font-size: 15px; font-weight: 700; }
        .date-btn-label { color: #4A5568; font-size: 9px; font-weight: 600; }
        .date-btn.active .date-btn-day { color: #00D563; }
        .date-btn.active .date-btn-label { color: #00D563; }
        
        .match-card {
            background: #111827;
            border: 1.5px solid #1F2D42;
            border-radius: 14px;
            padding: 14px 18px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .match-card:hover { border-color: #00D563; }
        .match-card.locked { opacity: 0.7; cursor: not-allowed; }
        
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 11px;
        }
        
        .match-group {
            background: #1A2A3A;
            color: #6B7A99;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
        }
        
        .match-time { color: #4A5568; font-size: 11px; }
        .match-time.locked { color: #F87171; }
        
        .match-teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .team {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        
        .flag { font-size: 24px; }
        .team-name { color: #fff; font-weight: 700; font-size: 14px; }
        
        .match-vs {
            color: #4A5568;
            font-weight: 800;
            font-size: 11px;
            padding: 0 10px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            padding: 16px;
        }
        
        .modal.active { display: flex; align-items: center; justify-content: center; }
        
        .modal-content {
            background: #111827;
            border-radius: 16px;
            max-width: 440px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            background: #0D1525;
            padding: 16px;
            border-bottom: 1px solid #1F2D42;
        }
        
        .modal-body { padding: 20px 16px; }
        .modal-footer { padding: 16px; text-align: center; }
        
        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            box-sizing: border-box;
            background: #0A0E1A;
            border: 1.5px solid #1F2D42;
            border-radius: 8px;
            padding: 12px 14px;
            color: #fff;
            font-size: 16px;
            outline: none;
            margin-bottom: 12px;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            border-color: #00D563;
        }
        
        .form-group {
            background: #111827;
            border: 1.5px solid #1F2D42;
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 10px;
        }
        
        .form-label {
            color: #8A9BBB;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }
        
        .btn {
            width: 100%;
            padding: 13px 0;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #00D563;
            color: #0A0E1A;
        }
        
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { background: #1F2D42; color: #4A5568; cursor: not-allowed; }
        
        .btn-secondary {
            background: transparent;
            border: 1px solid #1F2D42;
            color: #8A9BBB;
        }
        
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .option-btn {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1.5px solid #1F2D42;
            background: transparent;
            color: #8A9BBB;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .option-btn.selected {
            border-color: #00D563;
            background: #0D2E1E;
            color: #00D563;
            font-weight: 700;
        }
        
        .progress-bar {
            background: #1F2D42;
            border-radius: 4px;
            height: 3px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        
        .progress-fill {
            background: #00D563;
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        .leaderboard-item {
            background: #111827;
            border: 1.5px solid #1F2D42;
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        
        .leaderboard-rank {
            font-size: 22px;
            min-width: 28px;
            text-align: center;
        }
        
        .leaderboard-name {
            flex: 1;
        }
        
        .leaderboard-name-text {
            color: #fff;
            font-weight: 700;
            font-size: 15px;
        }
        
        .leaderboard-name-sub {
            color: #4A5568;
            font-size: 11px;
            margin-top: 2px;
        }
        
        .leaderboard-score {
            text-align: right;
        }
        
        .leaderboard-score-main {
            color: #00D563;
            font-weight: 900;
            font-size: 22px;
        }
        
        .leaderboard-score-sub {
            color: #4A5568;
            font-size: 10px;
        }
        
        .empty-state {
            background: #111827;
            border: 1px solid #1F2D42;
            border-radius: 14px;
            padding: 40px 24px;
            text-align: center;
        }
        
        .empty-state-emoji { font-size: 40px; margin-bottom: 8px; }
        .empty-state-text { color: #6B7A99; margin: 0; }
        
        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #1F2D42;
            font-size: 13px;
        }
        
        .result-row:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('predict')">⚽ Predict</button>
            <button class="tab-btn" onclick="switchTab('results')">📋 Results</button>
            <button class="tab-btn" onclick="switchTab('leaderboard')">🏅 Board</button>
        </div>

        <!-- PREDICT TAB -->
        <div id="predict-tab" class="tab-content active">
            <div class="header">
                <div style="color: #00D563; font-size: 12px; font-weight: 700; letter-spacing: 1.5px;">BIKELER ADDA</div>
                <h1>FIFA World Cup <span style="color: #00D563;">2026</span></h1>
                <p>Group Stage · Pick a match</p>
            </div>

            <div class="date-strip" id="dateStrip"></div>
            <div id="matchesList"></div>
        </div>

        <!-- RESULTS TAB -->
        <div id="results-tab" class="tab-content">
            <div class="header">
                <h2 style="font-size: 20px; margin: 0;">📋 Match Results & Bets</h2>
                <p>View all predictions and match results</p>
            </div>

            <div class="date-strip" id="dateStrip2"></div>
            <div id="resultsList"></div>
        </div>

        <!-- LEADERBOARD TAB -->
        <div id="leaderboard-tab" class="tab-content">
            <div class="header">
                <h1>🏅 Leaderboard</h1>
                <p>FIFA World Cup 2026 · All matches</p>
            </div>

            <button class="btn btn-secondary" onclick="buildLeaderboard()" style="margin-bottom: 14px;">🔄 Refresh</button>
            <div id="leaderboardList"></div>
        </div>
    </div>

    <!-- PREDICTION MODAL -->
    <div id="predictionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <button onclick="closePredictionModal()" style="background: transparent; border: none; color: #6B7A99; font-size: 18px; cursor: pointer;">←</button>
                <div style="text-align: center; margin-top: 10px;">
                    <div id="matchTitle" style="color: #fff; font-weight: 800; font-size: 14px;"></div>
                    <div style="color: #6B7A99; font-size: 11px; margin-top: 3px;">Group <span id="modalGroup"></span></div>
                </div>
            </div>

            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">YOUR NAME</label>
                    <input type="text" id="playerName" placeholder="e.g. Ramesh">
                </div>

                <div id="questionsList"></div>

                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" onclick="submitPrediction()" id="submitBtn">Submit Prediction</button>
            </div>
        </div>
    </div>

    <script>
        // ─────────────────────────────────────────────────────────────
        // SCHEDULE - All matches
        // ─────────────────────────────────────────────────────────────
        const SCHEDULE = {
            "2026-06-11": [
                { t1:"Mexico", t2:"South Africa", time:"3:00 PM", group:"A" },
                { t1:"South Korea", t2:"Czechia", time:"6:00 PM", group:"A" },
            ],
            "2026-06-12": [
                { t1:"Canada", t2:"Bosnia & Herz.", time:"3:00 PM", group:"B" },
                { t1:"USA", t2:"Paraguay", time:"6:00 PM", group:"D" },
                { t1:"Germany", t2:"Curaçao", time:"9:00 PM", group:"E" },
            ],
            "2026-06-13": [
                { t1:"Argentina", t2:"Algeria", time:"1:00 PM", group:"J" },
                { t1:"Austria", t2:"Jordan", time:"1:00 PM", group:"J" },
                { t1:"Portugal", t2:"DR Congo", time:"4:00 PM", group:"K" },
                { t1:"Spain", t2:"Saudi Arabia", time:"7:00 PM", group:"H" },
            ],
            "2026-06-14": [
                { t1:"Brazil", t2:"Algeria", time:"1:00 PM", group:"C" },
                { t1:"Netherlands", t2:"Uruguay", time:"4:00 PM", group:"H" },
                { t1:"France", t2:"Senegal", time:"7:00 PM", group:"I" },
                { t1:"Japan", t2:"Tunisia", time:"10:00 PM", group:"F" },
            ],
        };

        const FLAGS = {
            "Mexico":"🇲🇽","South Africa":"🇿🇦","South Korea":"🇰🇷","Czechia":"🇨🇿","Canada":"🇨🇦","Bosnia & Herz.":"🇧🇦",
            "USA":"🇺🇸","Paraguay":"🇵🇾","Germany":"🇩🇪","Curaçao":"🇨🇼","Argentina":"🇦🇷","Austria":"🇦🇹",
            "Spain":"🇪🇸","Saudi Arabia":"🇸🇦","Brazil":"🇧🇷","Algeria":"🇩🇿","Japan":"🇯🇵","Tunisia":"🇹🇳",
            "Australia":"🇦🇺","Turkey":"🇹🇷","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Morocco":"🇲🇦","Iran":"🇮🇷","New Zealand":"🇳🇿",
            "Ecuador":"🇪🇨","Sweden":"🇸🇪","France":"🇫🇷","Senegal":"🇸🇳","Iraq":"🇮🇶","Norway":"🇳🇴",
            "Belgium":"🇧🇪","Egypt":"🇪🇬","Netherlands":"🇳🇱","Uruguay":"🇺🇾","Ghana":"🇬🇭","Panama":"🇵🇦",
            "England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croatia":"🇭🇷","Portugal":"🇵🇹","DR Congo":"🇨🇩","Uzbekistan":"🇺🇿","Colombia":"🇨🇴",
            "Switzerland":"🇨🇭","Qatar":"🇶🇦","Ivory Coast":"🇨🇮","Haiti":"🇭🇹","Cabo Verde":"🇨🇻","Jordan":"🇯🇴",
        };

        const QUESTIONS = [
            { id:"winner", label:"Match Winner", options:["Team1","Draw","Team2"], points:3 },
            { id:"both_score", label:"Both Teams Score?", options:["Yes","No"], points:2 },
            { id:"total_goals", label:"Total Goals", options:["0–1","2–3","4–5","6+"], points:3 },
            { id:"first_scorer", label:"First Scorer", options:["Team1","Team2","No goals"], points:3 },
            { id:"exact_score", label:"Exact Score", type:"score", points:5 },
            { id:"halftime", label:"Half-Time Leader", options:["Team1","Draw","Team2"], points:2 },
            { id:"cards", label:"Yellow Cards", options:["0–1","2–3","4–5","6+"], points:2 },
            { id:"corners", label:"Corners", options:["0–5","6–9","10–13","14+"], points:2 },
            { id:"penalty", label:"Penalty Awarded?", options:["Yes","No"], points:3 },
            { id:"red_card", label:"Red Card?", options:["Yes","No"], points:3 },
        ];

        // ─────────────────────────────────────────────────────────────
        // STATE & STORAGE
        // ─────────────────────────────────────────────────────────────
        let currentTab = "predict";
        let currentDate = Object.keys(SCHEDULE).sort()[0];
        let predictions = {};
        let results = {};
        let currentMatch = null;
        let currentAnswers = {};
        let currentScore = { a: "", b: "" };

        function flag(name) { return FLAGS[name] || "🏳"; }

        function getTodayKey() {
            const d = new Date();
            return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
        }

        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split("-");
            return new Date(+y, +m - 1, +d).toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric" });
        }

        function matchKey(date, match) {
            return date + "::" + match.t1 + "vs" + match.t2;
        }

        function savePrediction(date, match, name, answers, scoreA, scoreB) {
            const key = "pred:" + matchKey(date, match) + ":" + name.toLowerCase();
            localStorage.setItem(key, JSON.stringify({ name, date, match, answers, scoreA, scoreB }));
        }

        function loadPredictions(date) {
            const preds = {};
            for (const match of (SCHEDULE[date] || [])) {
                const mk = matchKey(date, match);
                for (const key in localStorage) {
                    if (key.startsWith("pred:" + mk + ":")) {
                        const data = JSON.parse(localStorage[key]);
                        if (!preds[mk]) preds[mk] = [];
                        preds[mk].push(data);
                    }
                }
            }
            return preds;
        }

        function saveResult(date, match, result) {
            localStorage.setItem("result:" + matchKey(date, match), JSON.stringify(result));
        }

        function loadResults() {
            const res = {};
            for (const key in localStorage) {
                if (key.startsWith("result:")) {
                    res[key.replace("result:", "")] = JSON.parse(localStorage[key]);
                }
            }
            return res;
        }

        // ─────────────────────────────────────────────────────────────
        // UI FUNCTIONS
        // ─────────────────────────────────────────────────────────────
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
            event.target.classList.add("active");
            document.getElementById(tab + "-tab").classList.add("active");

            if (tab === "results") renderResults();
            if (tab === "leaderboard") buildLeaderboard();
        }

        function renderDateStrip(containerId, selectedDate, onSelect) {
            const dates = Object.keys(SCHEDULE).sort();
            let html = "";
            dates.forEach(date => {
                const [y, m, d] = date.split("-");
                const dow = new Date(+y, +m - 1, +d).toLocaleDateString("en-US", { weekday:"short" });
                const isActive = date === selectedDate;
                html += `
                    <button class="date-btn ${isActive ? "active" : ""}" onclick="switchDate('${date}', '${containerId}')">
                        <div class="date-btn-label">${dow.toUpperCase()}</div>
                        <div class="date-btn-day">${d}</div>
                    </button>
                `;
            });
            document.getElementById(containerId).innerHTML = html;
        }

        function switchDate(date, context) {
            currentDate = date;
            if (context === "dateStrip") renderMatches();
            if (context === "dateStrip2") renderResults();
        }

        function renderMatches() {
            renderDateStrip("dateStrip", currentDate, "predict");
            const matches = SCHEDULE[currentDate] || [];
            let html = "";

            matches.forEach((match, i) => {
                html += `
                    <div class="match-card" onclick="openPredictionModal(${i})">
                        <div class="match-header">
                            <span class="match-group">GROUP ${match.group}</span>
                            <span class="match-time">🕐 ${match.time} ET · ${match.venue || 'TBD'}</span>
                        </div>
                        <div class="match-teams">
                            <div class="team">
                                <span class="flag">${flag(match.t1)}</span>
                                <span class="team-name">${match.t1}</span>
                            </div>
                            <span class="match-vs">vs</span>
                            <div class="team" style="justify-content: flex-end;">
                                <span class="team-name">${match.t2}</span>
                                <span class="flag">${flag(match.t2)}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            if (matches.length === 0) {
                html = `<div class="empty-state"><div class="empty-state-emoji">📭</div><p class="empty-state-text">No matches on this day</p></div>`;
            }

            document.getElementById("matchesList").innerHTML = html;
        }

        function openPredictionModal(matchIdx) {
            const match = SCHEDULE[currentDate][matchIdx];
            currentMatch = match;
            currentAnswers = {};
            currentScore = { a: "", b: "" };

            document.getElementById("matchTitle").innerHTML = `${flag(match.t1)} ${match.t1} vs ${match.t2} ${flag(match.t2)}`;
            document.getElementById("modalGroup").innerHTML = match.group;

            let qhtml = "";
            QUESTIONS.forEach((q, i) => {
                if (q.type === "score") {
                    qhtml += `
                        <div class="form-group">
                            <label class="form-label">${i + 1}. ${q.label}</label>
                            <div style="display: flex; gap: 8px;">
                                <input type="number" placeholder="0" style="flex: 1;" onchange="currentScore.a = this.value" value="${currentScore.a}">
                                <span style="padding: 12px; color: #6B7A99; font-weight: 700;">–</span>
                                <input type="number" placeholder="0" style="flex: 1;" onchange="currentScore.b = this.value" value="${currentScore.b}">
                            </div>
                        </div>
                    `;
                } else {
                    let opts = q.options;
                    if (opts[0] === "Team1") opts = [match.t1, opts[1], match.t2];
                    if (opts[0] === "Team1" || (Array.isArray(opts) && opts[0]?.includes("Team"))) {
                        opts = opts.map(o => o === "Team1" ? match.t1 : o === "Team2" ? match.t2 : o);
                    }

                    qhtml += `
                        <div class="form-group">
                            <label class="form-label">${i + 1}. ${q.label} (${q.points} pts)</label>
                            <div class="options">
                                ${opts.map(opt => `
                                    <button class="option-btn ${currentAnswers[q.id] === opt ? "selected" : ""}" onclick="selectAnswer('${q.id}', '${opt}')">
                                        ${opt}
                                    </button>
                                `).join("")}
                            </div>
                        </div>
                    `;
                }
            });

            document.getElementById("questionsList").innerHTML = qhtml;
            document.getElementById("predictionModal").classList.add("active");
            updateProgress();
        }

        function selectAnswer(questionId, value) {
            currentAnswers[questionId] = value;
            updateProgress();
        }

        function updateProgress() {
            const answered = Object.keys(currentAnswers).length + (currentScore.a !== "" && currentScore.b !== "" ? 1 : 0);
            const total = QUESTIONS.length;
            const percent = (answered / total) * 100;
            document.getElementById("progressFill").style.width = percent + "%";
            
            const btn = document.getElementById("submitBtn");
            const isComplete = answered === total;
            btn.disabled = !isComplete;
            btn.textContent = isComplete ? "🔒 Lock In" : `${total - answered} questions left`;
        }

        function submitPrediction() {
            const name = document.getElementById("playerName").value.trim();
            if (!name) { alert("Enter your name"); return; }
            if (!currentScore.a || !currentScore.b) { alert("Enter exact score"); return; }

            savePrediction(currentDate, currentMatch, name, currentAnswers, currentScore.a, currentScore.b);
            closePredictionModal();
            alert("✅ Prediction saved!");
            renderMatches();
        }

        function closePredictionModal() {
            document.getElementById("predictionModal").classList.remove("active");
            document.getElementById("playerName").value = "";
        }

        function renderResults() {
            renderDateStrip("dateStrip2", currentDate, "results");
            results = loadResults();
            predictions = loadPredictions(currentDate);

            const matches = SCHEDULE[currentDate] || [];
            let html = "";

            matches.forEach(match => {
                const mk = matchKey(currentDate, match);
                const result = results[mk];
                const preds = predictions[mk] || [];

                html += `
                    <div class="match-card" style="margin-bottom: 14px;">
                        <div class="match-header">
                            <span class="match-group">GROUP ${match.group}</span>
                            ${result ? `<span style="color: #00D563; font-weight: 700;">✓ ${result.scoreA}–${result.scoreB} FT</span>` : `<span class="match-time">⏱ ${match.time}</span>`}
                        </div>
                        <div class="match-teams">
                            <div class="team">
                                <span class="flag">${flag(match.t1)}</span>
                                <span class="team-name">${match.t1}</span>
                            </div>
                            <span class="match-vs">vs</span>
                            <div class="team" style="justify-content: flex-end;">
                                <span class="team-name">${match.t2}</span>
                                <span class="flag">${flag(match.t2)}</span>
                            </div>
                        </div>
                        ${preds.length > 0 ? `<div style="margin-top: 10px; font-size: 12px; color: #6B7A99;">
                            ${preds.map(p => `<div style="padding: 5px 0;">👤 <strong>${p.name}</strong>: ${p.scoreA}–${p.scoreB} prediction</div>`).join("")}
                        </div>` : ""}
                    </div>
                `;
            });

            if (matches.length === 0) {
                html = `<div class="empty-state"><div class="empty-state-emoji">📭</div><p class="empty-state-text">No matches</p></div>`;
            }

            document.getElementById("resultsList").innerHTML = html;
        }

        function buildLeaderboard() {
            results = loadResults();
            const allPreds = {};
            
            for (const key in localStorage) {
                if (key.startsWith("pred:")) {
                    const data = JSON.parse(localStorage[key]);
                    const name = data.name;
                    if (!allPreds[name]) allPreds[name] = [];
                    allPreds[name].push(data);
                }
            }

            const leaderboard = [];
            for (const name in allPreds) {
                let total = 0;
                allPreds[name].forEach(pred => {
                    const mk = matchKey(pred.date, pred.match);
                    const result = results[mk];
                    if (result) {
                        total += 5; // Simple: 5 points per match with result
                    }
                });
                leaderboard.push({ name, total, preds: allPreds[name].length });
            }

            leaderboard.sort((a, b) => b.total - a.total);

            let html = "";
            if (leaderboard.length === 0) {
                html = `<div class="empty-state"><div class="empty-state-emoji">🏆</div><p class="empty-state-text">No predictions yet</p></div>`;
            } else {
                leaderboard.forEach((p, i) => {
                    const medal = ["🥇", "🥈", "🥉"][i] || (i + 1) + "";
                    html += `
                        <div class="leaderboard-item">
                            <div class="leaderboard-rank">${medal}</div>
                            <div class="leaderboard-name">
                                <div class="leaderboard-name-text">${p.name}</div>
                                <div class="leaderboard-name-sub">${p.preds} prediction${p.preds !== 1 ? "s" : ""}</div>
                            </div>
                            <div class="leaderboard-score">
                                <div class="leaderboard-score-main">${p.total}</div>
                                <div class="leaderboard-score-sub">pts</div>
                            </div>
                        </div>
                    `;
                });
            }

            document.getElementById("leaderboardList").innerHTML = html;
        }

        // ─────────────────────────────────────────────────────────────
        // INIT
        // ─────────────────────────────────────────────────────────────
        renderMatches();
    </script>
</body>
</html>
