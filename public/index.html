<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bikeler Adda – FIFA WC 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0A0E1A;color:#fff;min-height:100vh}
.wrap{max-width:600px;margin:0 auto;padding:0 14px}
.tabs{display:flex;background:#0D1525;border-bottom:1px solid #1F2D42;position:sticky;top:0;z-index:99}
.tab{flex:1;padding:11px 3px;border:none;background:transparent;color:#4A5568;font-size:11px;font-weight:400;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.tab.on{color:#fff;font-weight:700;border-bottom-color:#00D563}
.fcard{background:#111827;border:1.5px solid #1F2D42;border-radius:14px;padding:13px 15px;margin-bottom:9px}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.btn-g{background:#00D563;color:#0A0E1A}
.btn-g:disabled{background:#1F2D42;color:#4A5568;cursor:not-allowed}
input[type=text]{background:#0A0E1A;border:1.5px solid #1F2D42;border-radius:8px;padding:11px 13px;color:#fff;font-size:16px;outline:none;width:100%;box-sizing:border-box}
input:focus{border-color:#00D563}
.userbar{display:flex;justify-content:space-between;align-items:center;padding:7px 14px;background:#0D1525;border-bottom:1px solid #1F2D42;font-size:12px}
.hdr{text-align:center;padding:13px 0 10px}
.status{position:fixed;bottom:14px;right:14px;background:#0D2E1E;border:1px solid #00D563;color:#00D563;padding:8px 12px;border-radius:6px;font-size:11px;font-weight:600;display:none}
.status.on{display:block}
.mcard{background:#111827;border:1.5px solid #1F2D42;border-radius:14px;padding:12px;margin-bottom:9px;cursor:pointer}
.opts{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.optbtn{padding:6px 11px;border-radius:8px;border:1.5px solid #1F2D42;background:transparent;color:#8A9BBB;font-size:12px;cursor:pointer}
.optbtn.on{border-color:#00D563;background:#0D2E1E;color:#00D563;font-weight:700}
.gbadge{background:#1A2A3A;color:#6B7A99;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-block;margin-bottom:8px}
.sync-indicator{display:inline-block;width:8px;height:8px;border-radius:50%;background:#4A5568;margin-right:4px}
.sync-indicator.syncing{background:#F59E0B;animation:pulse 1s infinite}
@keyframes pulse{0%{opacity:1}50%{opacity:.5}100%{opacity:1}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
  <div style="max-width:370px;width:100%">
    <div style="text-align:center;margin-bottom:22px">
      <div style="font-size:48px;margin-bottom:6px">⚽</div>
      <div style="color:#00D563;font-size:11px;font-weight:700;letter-spacing:1.5px">BIKELER ADDA</div>
      <h1 style="font-size:21px;font-weight:800;margin:4px 0 2px">FIFA World Cup <span style="color:#00D563">2026</span></h1>
      <p style="color:#6B7A99;font-size:12px">Auto-synced to Google Sheet • No API Key</p>
    </div>
    <div class="fcard">
      <div id="loginMsg" style="display:none;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:12px;text-align:center"></div>
      <label style="color:#8A9BBB;font-size:11px;font-weight:600;display:block;margin-bottom:7px;font-size:13px">YOUR NAME</label>
      <input type="text" id="loginName" placeholder="e.g. Ramesh" style="font-size:18px;padding:13px;margin-bottom:14px" onkeydown="if(event.key==='Enter')login()">
      <button class="btn btn-g" onclick="login()" style="font-size:15px;padding:14px">Continue →</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none;padding-bottom:40px">
  <div class="userbar">
    <div style="display:flex;align-items:center;gap:6px">
      <span style="color:#4A5568">👤</span>
      <span id="curName" style="color:#8A9BBB;font-size:12px;font-weight:600"></span>
      <span class="sync-indicator" id="syncStatus"></span>
    </div>
    <button onclick="logout()" style="background:none;border:none;color:#4A5568;font-size:11px;cursor:pointer">Sign out</button>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="showTab('predict',this)">⚽ Predict</button>
    <button class="tab" onclick="showTab('myBets',this)">📋 My Bets</button>
    <button class="tab" onclick="showTab('leaderboard',this)">🏅 Board</button>
  </div>

  <div id="t-predict" class="wrap" style="padding-top:12px">
    <div class="hdr">
      <div style="color:#00D563;font-size:10px;font-weight:700;letter-spacing:1.5px">ROUND OF 32</div>
      <h1 style="font-size:20px;font-weight:800;margin:3px 0 2px">FIFA World Cup <span style="color:#00D563">2026</span></h1>
      <p style="color:#6B7A99;font-size:11px">All predictions auto-sync to Google Sheet</p>
    </div>
    <div id="pMatches"></div>
    <div style="height:20px"></div>
  </div>

  <div id="t-myBets" class="wrap" style="padding-top:12px;display:none">
    <div class="hdr">
      <h2 style="font-size:20px;font-weight:800">📋 My Predictions</h2>
    </div>
    <div id="myBetsContent"></div>
    <div style="height:20px"></div>
  </div>

  <div id="t-leaderboard" class="wrap" style="padding-top:12px;display:none">
    <div class="hdr">
      <h1 style="font-size:20px;font-weight:800">🏅 Leaderboard</h1>
      <p style="color:#6B7A99;font-size:11px">Auto-calculated from Google Sheet</p>
    </div>
    <div id="lbContent"></div>
    <div style="height:20px"></div>
  </div>
</div>

<div id="status" class="status">
  <span class="sync-indicator syncing"></span>Syncing to Google Sheet...
</div>

<script>
const DEPLOYMENT_URL = "https://script.google.com/macros/d/YAKfycbxLdPUEQuOX0k_-ihEpM61ljiIWdDquFBm9n6ZNGVO2Ofl6MzIUZ7k5_sDGd3UylKeLpw/usercallable";

const SCHEDULE={
  "m73":{t1:"South Africa",t2:"Canada",date:"Jun 28"},
  "m76":{t1:"Brazil",t2:"Japan",date:"Jun 29"},
  "m74":{t1:"Germany",t2:"Paraguay",date:"Jun 29"},
  "m75":{t1:"Netherlands",t2:"Morocco",date:"Jun 29"},
  "m78":{t1:"Ivory Coast",t2:"Norway",date:"Jun 30"},
  "m77":{t1:"France",t2:"Sweden",date:"Jun 30"},
  "m79":{t1:"Mexico",t2:"Ecuador",date:"Jun 30"},
  "m80":{t1:"England",t2:"DR Congo",date:"Jul 1"},
  "m82":{t1:"Belgium",t2:"Senegal",date:"Jul 1"},
  "m81":{t1:"USA",t2:"Bosnia & Herz.",date:"Jul 1"},
  "m84":{t1:"Spain",t2:"Austria",date:"Jul 2"},
  "m83":{t1:"Portugal",t2:"Croatia",date:"Jul 2"},
  "m85":{t1:"Switzerland",t2:"Algeria",date:"Jul 2"},
  "m88":{t1:"Australia",t2:"Egypt",date:"Jul 3"},
  "m86":{t1:"Argentina",t2:"Cape Verde",date:"Jul 3"},
  "m87":{t1:"Colombia",t2:"Ghana",date:"Jul 3"},
};

const FLAGS={"South Africa":"🇿🇦","Canada":"🇨🇦","Brazil":"🇧🇷","Japan":"🇯🇵","Germany":"🇩🇪","Paraguay":"🇵🇾","Netherlands":"🇳🇱","Morocco":"🇲🇦","Ivory Coast":"🇨🇮","Norway":"🇳🇴","France":"🇫🇷","Sweden":"🇸🇪","Mexico":"🇲🇽","Ecuador":"🇪🇨","England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","DR Congo":"🇨🇩","Belgium":"🇧🇪","Senegal":"🇸🇳","USA":"🇺🇸","Bosnia & Herz.":"🇧🇦","Spain":"🇪🇸","Austria":"🇦🇹","Portugal":"🇵🇹","Croatia":"🇭🇷","Switzerland":"🇨🇭","Algeria":"🇩🇿","Australia":"🇦🇺","Egypt":"🇪🇬","Argentina":"🇦🇷","Cape Verde":"🇨🇻","Colombia":"🇨🇴","Ghana":"🇬🇭"};
const f=n=>FLAGS[n]||"🏳";

let CUR={name:""};
let data={};
let selected={};

function showMsg(msg,ok){const el=document.getElementById("loginMsg");el.style.display="block";el.style.background=ok?"#0D2E1E":"#1A0808";el.style.color=ok?"#00D563":"#F87171";el.textContent=msg;}

async function login(){
  const nm=document.getElementById("loginName").value.trim();
  if(!nm){showMsg("Enter your name");return;}
  CUR.name=nm;
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("mainApp").style.display="block";
  document.getElementById("curName").textContent=nm;
  document.getElementById("syncStatus").classList.add("syncing");
  await loadData();
  renderPredict();
  // Auto-sync every 30 seconds
  setInterval(loadData,30000);
}

function logout(){
  CUR.name="";
  document.getElementById("mainApp").style.display="none";
  document.getElementById("loginScreen").style.display="flex";
  document.getElementById("loginName").value="";
}

function showTab(t,btn){
  ["predict","myBets","leaderboard"].forEach(x=>document.getElementById("t-"+x).style.display="none");
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));
  document.getElementById("t-"+t).style.display="block";btn.classList.add("on");
  if(t==="myBets")renderMyBets();
  if(t==="leaderboard")renderLeaderboard();
}

async function callSheet(action,payload){
  const status=document.getElementById("status");
  status.classList.add("on");
  try{
    const resp=await fetch(DEPLOYMENT_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action,...payload})
    });
    const result=await resp.json();
    status.classList.remove("on");
    return result;
  }catch(e){
    console.warn("Sync error:",e);
    status.classList.remove("on");
    return null;
  }
}

async function loadData(){
  const result=await callSheet("loadAll",{});
  if(result){data=result;}
  document.getElementById("syncStatus").className="sync-indicator";
}

async function savePrediction(matchId,winner){
  const m=SCHEDULE[matchId];
  await callSheet("savePred",{
    name:CUR.name,
    matchId,
    t1:m.t1,
    t2:m.t2,
    ans:{winner},
    sa:"",
    sb:"",
    etA:"",
    etB:"",
    penA:"",
    penB:""
  });
  await loadData();
  renderPredict();
}

function renderPredict(){
  let html="";
  Object.entries(SCHEDULE).forEach(([id,m])=>{
    const pred=data[`pred:${id}:${CUR.name.toLowerCase()}`];
    html+=`<div class="mcard" style="cursor:pointer">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span class="gbadge">${m.date}</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="flex:1"><span style="font-size:18px">${f(m.t1)}</span> <strong>${m.t1}</strong></div>
        <div style="color:#4A5568;font-weight:800">VS</div>
        <div style="flex:1;text-align:right"><strong>${m.t2}</strong> <span style="font-size:18px">${f(m.t2)}</span></div>
      </div>
      <div class="opts">
        <button class="optbtn ${pred&&pred.ans.winner===m.t1?"on":""}" onclick="selectWinner('${id}','${m.t1}')">${f(m.t1)} ${m.t1}</button>
        <button class="optbtn ${pred&&pred.ans.winner===m.t2?"on":""}" onclick="selectWinner('${id}','${m.t2}')">${f(m.t2)} ${m.t2}</button>
      </div>
    </div>`;
  });
  document.getElementById("pMatches").innerHTML=html;
}

function selectWinner(id,team){
  selected[id]=team;
  document.querySelectorAll(`[data-match="${id}"]`).forEach(b=>b.classList.remove("on"));
  event.target.classList.add("on");
  setTimeout(()=>savePrediction(id,team),300);
}

function renderMyBets(){
  let html="";
  Object.entries(SCHEDULE).forEach(([id,m])=>{
    const pred=data[`pred:${id}:${CUR.name.toLowerCase()}`];
    if(pred){
      html+=`<div class="fcard">
        <div style="font-weight:700;font-size:13px">${f(m.t1)} ${m.t1} vs ${m.t2} ${f(m.t2)}</div>
        <div style="color:#6B7A99;font-size:10px;margin-top:2px">${m.date}</div>
        <div style="margin-top:8px;background:#0D2E1E;color:#00D563;border-radius:6px;padding:6px;text-align:center;font-weight:700">✓ ${f(pred.ans.winner)} ${pred.ans.winner}</div>
      </div>`;
    }
  });
  document.getElementById("myBetsContent").innerHTML=html||`<div style="background:#111827;border:1px solid #1F2D42;border-radius:14px;padding:30px;text-align:center;color:#6B7A99">No predictions yet</div>`;
}

function renderLeaderboard(){
  let html=`<div class="fcard" style="text-align:center">
    <div style="color:#00D563;font-weight:700;font-size:16px;margin-bottom:10px">📊 SCORES AUTO-CALCULATED</div>
    <p style="color:#6B7A99;margin-bottom:14px;font-size:12px">When matches end, results are auto-fetched and scores calculated in Google Sheet</p>
    <a href="https://docs.google.com/spreadsheets/d/1ZtHIMJ2rtX0Fn0QXrHW4Hlh-aVXDyAC-b7VtTPw5o4c/edit?usp=sharing" target="_blank" style="background:#00D563;color:#0A0E1A;border:none;border-radius:10px;padding:12px 20px;text-decoration:none;font-weight:700;display:inline-block">📗 View Google Sheet</a>
  </div>`;
  document.getElementById("lbContent").innerHTML=html;
}
</script>
</body>
</html>
