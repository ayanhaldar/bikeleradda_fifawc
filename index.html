<title>Bikeler Adda – FIFA WC 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0A0E1A;color:#fff;min-height:100vh}
.wrap{max-width:620px;margin:0 auto;padding:0 14px}

.tabs{display:flex;background:#0D1525;border-bottom:1px solid #1F2D42;position:sticky;top:0;z-index:99}
.tab{flex:1;padding:13px 4px;border:none;background:transparent;color:#4A5568;font-size:13px;font-weight:400;border-bottom:2px solid transparent;cursor:pointer}
.tab.on{color:#fff;font-weight:700;border-bottom-color:#00D563}

.dstrip{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.dstrip::-webkit-scrollbar{display:none}
.dbtn{flex-shrink:0;padding:6px 9px;border-radius:8px;min-width:42px;text-align:center;border:1.5px solid #1F2D42;background:transparent;cursor:pointer;color:#8A9BBB}
.dbtn.on{border-color:#00D563;background:#0D2E1E}
.dbtn .dd{font-size:15px;font-weight:700}
.dbtn .dw{font-size:9px;font-weight:600;color:#4A5568}
.dbtn.on .dd,.dbtn.on .dw{color:#00D563}

.mcard{background:#111827;border:1.5px solid #1F2D42;border-radius:14px;padding:13px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.mcard:hover{border-color:#00D563}
.mcard.locked{opacity:.7;cursor:not-allowed}
.mcard.done{border-color:#1A3A2A}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;font-size:11px}
.grp{background:#1A2A3A;color:#6B7A99;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.mteams{display:flex;align-items:center;justify-content:space-between}
.tside{display:flex;align-items:center;gap:7px;flex:1}
.tside.right{justify-content:flex-end}
.tflag{font-size:22px}
.tname{font-weight:700;font-size:14px}
.mvs{color:#4A5568;font-weight:800;font-size:11px;padding:0 10px}

.fcard{background:#111827;border:1.5px solid #1F2D42;border-radius:14px;padding:14px 16px;margin-bottom:10px}
.fcard.answered{border-color:#1A3A2A}
.flabel{color:#8A9BBB;font-size:12px;font-weight:600;letter-spacing:.5px;display:block;margin-bottom:8px}
.flabel-q{color:#fff;font-size:13px;font-weight:600;display:flex;justify-content:space-between;margin-bottom:10px}
.pts-badge{background:#1A2A3A;color:#4A5568;font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap}
.pts-badge.on{background:#0D2E1E;color:#00D563}
.opts{display:flex;flex-wrap:wrap;gap:6px}
.optbtn{padding:6px 12px;border-radius:8px;border:1.5px solid #1F2D42;background:transparent;color:#8A9BBB;font-size:13px;cursor:pointer;transition:all .15s}
.optbtn.on{border-color:#00D563;background:#0D2E1E;color:#00D563;font-weight:700}

.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-g{background:#00D563;color:#0A0E1A}
.btn-g:disabled{background:#1F2D42;color:#4A5568;cursor:not-allowed}
.btn-s{background:transparent;border:1px solid #1F2D42;color:#8A9BBB;border-radius:10px;padding:8px 16px;font-size:13px;cursor:pointer}
.btn-danger{background:#1A0808;border:1px solid #3A1A1A;color:#F87171}
.btn-danger:hover{background:#2A0A0A}

input[type=text],input[type=number],input[type=password]{background:#0A0E1A;border:1.5px solid #1F2D42;border-radius:8px;padding:12px 14px;color:#fff;font-size:16px;outline:none;width:100%;box-sizing:border-box}
input[type=text]:focus,input[type=number]:focus,input[type=password]:focus{border-color:#00D563}

.pbar{height:3px;background:#1F2D42;border-radius:3px;overflow:hidden;margin-bottom:14px}
.pfill{height:100%;background:#00D563;border-radius:3px;transition:width .3s}

.notice{background:#0D1A0D;border:1px solid #1A3A1A;border-radius:10px;padding:10px 14px;font-size:12px;color:#4A9A64;margin-bottom:12px;text-align:center}
.empty{background:#111827;border:1px solid #1F2D42;border-radius:14px;padding:40px;text-align:center;color:#6B7A99}

.hdr{text-align:center;padding:16px 0 12px}
.hdr-eyebrow{color:#00D563;font-size:11px;font-weight:700;letter-spacing:1.5px}
.hdr h1{font-size:21px;font-weight:800;margin:4px 0 2px}
.hdr p{color:#6B7A99;font-size:12px}

.stickybar{position:sticky;top:43px;background:#0A0E1A;z-index:10;padding-top:10px;padding-bottom:8px}

.lbcard{background:#111827;border:1.5px solid #1F2D42;border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.lbcard.gold{border-color:#F59E0B;background:linear-gradient(135deg,#1A2E1A,#0D1A0D)}
.lbrank{font-size:22px;min-width:30px;text-align:center}
.lbname{flex:1}
.lbname-main{font-weight:700;font-size:15px}
.lbcard.gold .lbname-main{color:#F59E0B}
.lbname-sub{color:#4A5568;font-size:11px;margin-top:2px}
.lbpts{text-align:right}
.lbpts-main{font-weight:900;font-size:22px;color:#00D563}
.lbcard.gold .lbpts-main{color:#F59E0B}
.lbpts-sub{color:#4A5568;font-size:10px}

.pred-card{background:#111827;border:1px solid #1F2D42;border-radius:10px;padding:12px;margin-bottom:8px}
.pred-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pred-name{color:#00D563;font-weight:700}
.pred-score{background:#0D2E1E;color:#00D563;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.pred-time{color:#4A5568;font-size:10px}
.pred-del{color:#F87171;cursor:pointer;font-size:12px;text-decoration:underline}

.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#0A0E1A;overflow-y:auto;z-index:200}
.modal.on{display:block}
</style>
</head>
<body>

<div class="tabs">
  <button class="tab on" onclick="showTab('predict',this)">⚽ Predict</button>
  <button class="tab" onclick="showTab('results',this)">📋 Results</button>
  <button class="tab" onclick="showTab('leaderboard',this)">🏅 Board</button>
  <button class="tab" onclick="showTab('admin',this)">🔧 Admin</button>
</div>

<!-- PREDICT TAB -->
<div id="t-predict" class="wrap" style="padding-top:14px">
  <div class="hdr">
    <div class="hdr-eyebrow">BIKELER ADDA</div>
    <h1>FIFA World Cup <span style="color:#00D563">2026</span></h1>
    <p>Group Stage · Pick a match to predict</p>
  </div>
  <div class="dstrip" id="pStrip"></div>
  <div id="pMatches"></div>
  <div style="height:20px"></div>
</div>

<!-- RESULTS TAB -->
<div id="t-results" class="wrap" style="padding-top:14px;display:none">
  <div class="hdr">
    <h2 style="font-size:20px;font-weight:800">📊 Live Cumulative Scores</h2>
    <p>All matches · Updated in real-time</p>
  </div>
  <div id="lbContent"></div>
  <div style="height:20px"></div>
</div>

<!-- LEADERBOARD TAB -->
<div id="t-leaderboard" class="wrap" style="padding-top:14px;display:none">

    <div class="hdr-eyebrow">BIKELER ADDA</div>

    <p>FIFA World Cup 2026</p>
  </div>
  <div id="lbContent2"></div>
  <div style="height:20px"></div>
</div>

<!-- ADMIN TAB -->
<div id="t-admin" class="wrap" style="padding-top:14px;display:none">

    <h2 style="font-size:20px;font-weight:800">🔧 Admin Panel</h2>
  </div>
  
  <div id="adminLock">
    <div class="fcard">
      <label class="flabel">ADMIN PIN</label>
      <input type="password" id="adminPin" placeholder="Enter PIN" style="margin-bottom:12px">
      <button class="btn btn-g" onclick="checkPin()">Unlock</button>
    </div>
  </div>

  <div id="adminPanel" style="display:none">
    <div class="notice">✅ Admin unlocked</div>
    
    <!-- AUTO-FETCH RESULTS -->
    <div style="background:#0D1A2A;border:1.5px solid #1F3A52;border-radius:14px;padding:16px;margin-bottom:16px">

      <div class="dstrip" id="aStrip"></div>
      <div id="aMatches"></div>
    </div>

    <!-- DUPLICATE MANAGEMENT -->
    <div style="background:#1A0A0A;border:1.5px solid #3A1A1A;border-radius:14px;padding:16px">
      <h3 style="color:#F87171;font-size:13px;font-weight:700;margin-bottom:12px">🗑️ Manage Duplicates</h3>
      <div id="dupeContent"></div>
    </div>
  </div>
  <div style="height:20px"></div>
</div>

<!-- NAME SCREEN -->
<div id="nameView" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#0A0E1A;overflow-y:auto;z-index:200">
  <div class="wrap" style="padding:14px">
    <button onclick="closeForm()" style="background:transparent;border:none;color:#6B7A99;font-size:20px;cursor:pointer;margin-bottom:14px;display:block">← Back</button>
    <div style="background:#111827;border:1.5px solid #1F2D42;border-radius:16px;padding:18px;text-align:center;margin-bottom:18px">
      <div id="nMatchInfo" style="color:#6B7A99;font-size:11px;margin-bottom:12px"></div>
      <div style="display:flex;align-items:center;justify-content:center;gap:20px">
        <div style="text-align:center">
          <div id="nFlag1" style="font-size:36px"></div>
          <div id="nTeam1" style="color:#fff;font-weight:700;font-size:13px;margin-top:5px"></div>
        </div>
        <div style="color:#4A5568;font-weight:800;font-size:18px">VS</div>
        <div style="text-align:center">
          <div id="nFlag2" style="font-size:36px"></div>
          <div id="nTeam2" style="color:#fff;font-weight:700;font-size:13px;margin-top:5px"></div>
        </div>
      </div>
    </div>
    <div style="background:#111827;border:1.5px solid #1F2D42;border-radius:16px;padding:20px">
      <label class="flabel" style="font-size:13px;margin-bottom:10px">👤 ENTER YOUR NAME</label>
      <input type="text" id="pName" placeholder="e.g. Ramesh, Suresh…" style="font-size:18px;padding:14px;margin-bottom:16px" onkeydown="if(event.key==='Enter') startQuestions()">
      <button class="btn btn-g" onclick="startQuestions()" style="font-size:16px;padding:15px">Start Predicting →</button>
    </div>
    <div style="height:30px"></div>
  </div>
</div>

<!-- QUESTIONS SCREEN -->
<div id="questionsView" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#0A0E1A;overflow-y:auto;z-index:200">
  <div class="wrap" style="padding:0 14px">
    <div class="stickybar">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:7px">
        <button onclick="backToName()" style="background:transparent;border:none;color:#6B7A99;font-size:20px;cursor:pointer">←</button>
        <div style="flex:1;text-align:center">
          <div id="fTitle" style="font-weight:800;font-size:14px"></div>
          <div id="fSub" style="color:#6B7A99;font-size:11px;margin-top:2px"></div>
        </div>
        <div id="fCount" style="color:#00D563;font-size:13px;font-weight:700;min-width:32px;text-align:right">0/10</div>
      </div>
      <div class="pbar"><div class="pfill" id="pFill" style="width:0%"></div></div>
    </div>
    <div id="questions"></div>
    <div style="position:sticky;bottom:0;background:#0A0E1A;padding:12px 0 20px">
      <button class="btn btn-g" id="submitBtn" onclick="submitPred()" disabled style="font-size:16px;padding:16px;border-radius:12px">
        Answer all 10 questions
      </button>
    </div>
  </div>
</div>

function todayOrFirst(){
  const today = new Date().toISOString().slice(0,10);
  const dates = Object.keys(S).sort();
  return dates.includes(today) ? today : dates[0];
}
function nextOpenDate(){
  const now = new Date();
  const dates = Object.keys(S).sort();
  for(const d of dates){
    if((S[d]||[]).some(m => now < new Date(m.ko))) return d;
  }
  return dates[dates.length-1];
}
function mk(date,m){ return date+"::"+m.t1+"vs"+m.t2; }
function kicked(m){ return new Date() >= new Date(m.ko); }
function over(m){ return new Date() >= new Date(new Date(m.ko).getTime()+115*60000); }
function hasUpcoming(date){ return (S[date]||[]).some(m=>!kicked(m)); }
function fmtDate(d){
  const [y,mo,dy]=d.split("-");
  return new Date(+y,+mo-1,+dy).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
}

// ─── Storage ───────────────────────────────────────────────────────
function savePred(date,m,name,ans,sa,sb){
  localStorage.setItem("p:"+mk(date,m)+":"+name.trim().toLowerCase(),
    JSON.stringify({name:name.trim(),date,match:m,ans,sa,sb}));
}
function loadPreds(date){
  const out={};
  for(const k in localStorage){
    if(k.startsWith("p:"+date+"::")){
      const d=JSON.parse(localStorage[k]);
      const key=mk(d.date,d.match);
      if(!out[key]) out[key]=[];
      out[key].push(d);
    }
  }
  return out;
}
function allPreds(){
  const out=[];
  for(const k in localStorage) if(k.startsWith("p:")) out.push(JSON.parse(localStorage[k]));
  return out;
}
function deletePred(date,m,name){
  localStorage.removeItem("p:"+mk(date,m)+":"+name.trim().toLowerCase());
}
function saveResult(date,m,res){
  localStorage.setItem("r:"+mk(date,m),JSON.stringify(res));
}
function loadResult(date,m){
  const v=localStorage.getItem("r:"+mk(date,m));
  return v?JSON.parse(v):null;
}
function allResults(){
  const out={};
  for(const k in localStorage) if(k.startsWith("r:")){
    out[k.slice(2)]=JSON.parse(localStorage[k]);
  }
  return out;
}

// ─── Scoring ────────────────────────────────────────────────────────
function score(pred,res){
  if(!res) return null;
  let pts=0;
  const a=pred.ans, r=res;
  if(a.winner===r.winner) pts+=3;
  if(a.both_score===r.both_score) pts+=2;
  if(a.total_goals===r.total_goals) pts+=3;
  if(a.first_scorer===r.first_scorer) pts+=3;
  if(String(pred.sa)===String(r.sa)&&String(pred.sb)===String(r.sb)) pts+=5;
  if(a.ht_winner===r.ht_winner) pts+=2;
  if(a.yellows===r.yellows) pts+=2;
  if(a.corners===r.corners) pts+=2;
  if(a.penalty===r.penalty) pts+=3;
  if(a.red_card===r.red_card) pts+=3;
  return pts;
}

// ─── DATE STRIP ────────────────────────────────────────────────────
function stripHTML(sel,activeDate,onClick){
  const dates=Object.keys(S).sort();
  const today=new Date().toISOString().slice(0,10);
  return dates.map(d=>{
    const [y,mo,dy]=d.split("-");
    const dow=new Date(+y,+mo-1,+dy).toLocaleDateString("en-US",{weekday:"short"});
    const isOn=d===activeDate;
    const isToday=d===today;
    const open=hasUpcoming(d);
    const isPast=!open&&d<today;
    let tag="";
    if(isToday&&open) tag='<div style="color:#00D563;font-size:8px;font-weight:700">TODAY</div>';
    else if(isToday&&!open) tag='<div style="color:#4A5568;font-size:8px">DONE</div>';
    else if(open) tag='<div style="color:#60A5FA;font-size:8px;font-weight:700">OPEN</div>';
    else tag='<div style="color:#2D3A52;font-size:8px">DONE</div>';
    return `<button class="dbtn ${isOn?"on":""}" onclick="${onClick}('${d}')" style="${isPast?"opacity:.45":""}">
      <div class="dw">${dow.toUpperCase()}</div>
      <div class="dd">${dy}</div>
      ${tag}
    </button>`;
  }).join("");
}

// ─── LEADERBOARD ───────────────────────────────────────────────────
function renderLeaderboard(containerId){
  const res=allResults();
  const preds=allPreds();
  const tally={};
  preds.forEach(p=>{
    const key=mk(p.date,p.match);
    const r=res[key];
    const nm=p.name;
    if(!tally[nm]) tally[nm]={name:nm,total:0,matched:0,predicted:0};
    tally[nm].predicted++;
    const pts=score(p,r);
    if(pts!==null){ tally[nm].total+=pts; tally[nm].matched++; }
  });
  const board=Object.values(tally).sort((a,b)=>b.total-a.total);
  const MEDALS=["🥇","🥈","🥉"];

  let html="";
  if(!board.length){
    html=`<div class="empty"><div style="font-size:40px;margin-bottom:8px">🏆</div><strong>Leaderboard updates after match results</strong><p style="color:#4A5568;font-size:12px;margin-top:8px">Scores accumulate from all completed matches</p></div>`;
  } else {
    html=`<div style="background:#0D1A0D;border:2px solid #00D563;border-radius:14px;padding:16px;margin-bottom:16px">
      <div style="color:#00D563;font-size:13px;font-weight:800">📊 LIVE CUMULATIVE SCORES</div>
      <div style="color:#4A5568;font-size:11px;margin-top:4px">Totals from all matches completed</div>
    </div>`;
    board.forEach((p,i)=>{
      const maxPts=p.matched*MAX_PTS;
      html+=`<div class="lbcard ${i===0?"gold":""}">
        <div class="lbrank">${i<3?MEDALS[i]:`<span style="color:#4A5568;font-size:13px;font-weight:700">#${i+1}</span>`}</div>
        <div class="lbname">
          <div class="lbname-main">${p.name}</div>
          <div class="lbname-sub">${p.matched}/${p.predicted} matches scored</div>
        </div>
        <div class="lbpts">
          <div class="lbpts-main">${p.total}</div>
          <div class="lbpts-sub">/${maxPts} max</div>
        </div>
      </div>`;
    });
  }
  document.getElementById(containerId).innerHTML=html;
}

function updateProg(){

  const pct=(answered/total)*100;
  document.getElementById("pFill").style.width=pct+"%";
  document.getElementById("fCount").textContent=answered+"/"+total;
  const allDone=Qs.every(q=>q.type==="score"?scoreAnswered:!!curAnswers[q.id]);

async function fetchResult(idx){
  const m=S[aDate][idx];
  const btn=event.target;
  btn.disabled=true;
  btn.textContent="🔄 Fetching…";
  
  try {
    // Mock result for demo - in real version would fetch from API
    // For now, use a simple dialog to enter results
    const sa=prompt(`${m.t1} goals:`,"0");
    if(sa===null) {btn.disabled=false;btn.textContent="🔄 Fetch Result";return;}
    const sb=prompt(`${m.t2} goals:`,"0");
    if(sb===null) {btn.disabled=false;btn.textContent="🔄 Fetch Result";return;}
    
    // Auto-determine some fields
    const saNum=parseInt(sa), sbNum=parseInt(sb);
    const result={
      sa:saNum, sb:sbNum,
      winner: saNum>sbNum?m.t1:sbNum>saNum?m.t2:"Draw",
      both_score: (saNum>0&&sbNum>0)?"Yes":"No",
      total_goals: saNum+sbNum<=1?"0–1":saNum+sbNum<=3?"2–3":saNum+sbNum<=5?"4–5":"6+",
      first_scorer: prompt("First goal scored by ("+m.t1+"/"+m.t2+"/No goals):", m.t1),
      ht_winner: prompt("Half-time leader ("+m.t1+"/Draw/"+m.t2+"):", m.t1),
      yellows: prompt("Total yellow cards (0–1/2–3/4–5/6+):", "0–1"),
      corners: prompt("Total corners (0–5/6–9/10–13/14+):", "6–9"),
      penalty: prompt("Penalty awarded? (Yes/No):", "No"),
      red_card: prompt("Red card shown? (Yes/No):", "No"),
    };
    
    saveResult(aDate,m,result);
    renderLeaderboard("lbContent");
    renderLeaderboard("lbContent2");
    renderAutoFetch();
    alert("✅ Result saved & leaderboard updated!");
  } catch(e){
    alert("Error: "+e.message);
    btn.disabled=false;
    btn.textContent="🔄 Fetch Result";
  }
}

function renderDuplicates(){
  const allP=allPreds();
  
  // Group ALL predictions by bettor name (lowercase)
  const byName={};
  allP.forEach(p=>{
    const nm=p.name.trim().toLowerCase();
    if(!byName[nm]) byName[nm]={name:p.name,preds:[]};
    byName[nm].preds.push(p);
  });
  
  // Sort names alphabetically
  const names=Object.values(byName).sort((a,b)=>a.name.localeCompare(b.name));
  
  let html="";
  if(!names.length){
    html=`<div style="color:#4A5568;font-size:12px;text-align:center;padding:20px">📭 No predictions yet</div>`;
  } else {
    // Show all bettors with their predictions
    html+=`<div style="color:#8A9BBB;font-size:11px;margin-bottom:12px;text-align:center">
      ${names.length} bettor${names.length!==1?"s":""} · ${allP.length} total predictions<br>
      <span style="color:#4A5568">Delete wrong entries or duplicates (e.g. Ramesh vs Ramesh1)</span>
    </div>`;
    
    names.forEach(bettor=>{
      const nm=bettor.name;
      const preds=bettor.preds;
      html+=`<div style="background:#0A0E1A;border:1px solid #1F2D42;border-radius:10px;padding:12px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="color:#00D563;font-weight:700;font-size:14px">👤 ${nm}</span>
          <span style="background:#1A2A3A;color:#6B7A99;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px">${preds.length} prediction${preds.length!==1?"s":""}</span>
        </div>`;
      
      preds.forEach(p=>{
        const storageKey=("p:"+mk(p.date,p.match)+":"+p.name.trim().toLowerCase()).replace(/'/g,"\\'");
        html+=`<div class="pred-card">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="color:#fff;font-size:12px;font-weight:600">
                ${f(p.match.t1)} ${p.match.t1} vs ${p.match.t2} ${f(p.match.t2)}
              </div>
              <div style="color:#4A5568;font-size:10px;margin-top:3px">
                ${fmtDate(p.date)} · Predicted: ${p.sa}–${p.sb}
              </div>
            </div>
            <button onclick="delPredByKey('${storageKey}')" style="background:#1A0808;border:1px solid #3A1A1A;color:#F87171;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;white-space:nowrap">
              🗑️ Delete
            </button>
          </div>
        </div>`;
      });
      
      // Delete all button if multiple predictions
      if(preds.length>1){
        html+=`<button onclick="deleteAllByName('${nm.replace(/'/g,"\\'")}')" style="width:100%;background:#1A0808;border:1px solid #3A1A1A;color:#F87171;border-radius:8px;padding:6px;font-size:11px;cursor:pointer;margin-top:6px">
          🗑️ Delete ALL ${nm}'s predictions
        </button>`;
      }
      html+=`</div>`;
    });
  }
  document.getElementById("dupeContent").innerHTML=html;
}

function delPredByKey(storageKey){
  if(confirm("Delete this prediction?")){
    localStorage.removeItem(storageKey);
    renderDuplicates();
    renderLeaderboard("lbContent");
    renderLeaderboard("lbContent2");
  }
}

function deleteAllByName(name){
  if(!confirm("Delete ALL predictions by "+name+"?")) return;
  const nameLower=name.trim().toLowerCase();
  const toDelete=[];
  for(const k in localStorage){
    if(k.startsWith("p:")&&k.endsWith(":"+nameLower)){
      toDelete.push(k);
    }
  }
  toDelete.forEach(k=>localStorage.removeItem(k));
  alert("✅ Deleted "+toDelete.length+" prediction"+(toDelete.length!==1?"s":"")+" by "+name);
  renderDuplicates();
  renderLeaderboard("lbContent");
  renderLeaderboard("lbContent2");
}

// ─── INIT ─────────────────────────────────────────────────────────
renderPredict();
</script>
</body>
</html>
